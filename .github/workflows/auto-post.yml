name: Tistory 자동 포스팅

on:
  schedule:
    - cron: '0 * * * *'  # 매시간 정각 (UTC)
  workflow_dispatch:
    inputs:
      max_posts:
        description: '이번 실행에서 발행할 최대 글 수'
        required: false
        default: '5'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: auto-post
  cancel-in-progress: false  # 실행 중인 작업은 취소하지 않고 대기

jobs:
  post:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v5

      - name: Python 설치
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: Playwright Chromium 설치
        run: playwright install chromium --with-deps

      - name: 자동 포스팅 실행
        id: posting
        env:
          TISTORY_TSAL: ${{ secrets.TISTORY_TSAL }}
          TISTORY_XSRF_TOKEN: ${{ secrets.TISTORY_XSRF_TOKEN }}
          TISTORY_SESSION: ${{ secrets.TISTORY_SESSION }}
          TISTORY_TSSESSION: ${{ secrets.TISTORY_TSSESSION }}
          MAX_POSTS: ${{ github.event.inputs.max_posts || '5' }}
        run: python post_to_tistory.py

      - name: 상태 파일 커밋
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add published.json failed.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update published posts [skip ci]"
          git push

      - name: 실패 알림 요약
        if: failure()
        run: |
          {
            echo "## 자동 포스팅 실패"
            echo ""
            echo "| 항목 | 내용 |"
            echo "|------|------|"
            echo "| 실행 시각 | $(date '+%Y-%m-%d %H:%M UTC') |"
            echo "| 실행 로그 | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
            echo ""
            if [ -f failed.json ] && [ "$(cat failed.json)" != "{}" ]; then
              echo "### 재시도 대기 중인 포스트"
              echo '```json'
              cat failed.json
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
