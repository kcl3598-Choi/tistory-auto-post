name: Tistory 자동 포스팅 

on:
  schedule:
    - cron: '0 * * * *'   # 매시간 정각 (UTC 기준)
  workflow_dispatch:        # 수동 실행 버튼

jobs:
  post:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: Playwright 의존성 설치
        run: |
          sudo apt-get install -y \
            libnss3 libnspr4 libdbus-1-3 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libgbm1 libpango-1.0-0 libcairo2 \
            libasound2t64 libatspi2.0-0 libwayland-client0

      - name: Playwright Chromium 설치
        run: playwright install chromium

      - name: 자동 포스팅 실행
        env:
          TISTORY_EMAIL: ${{ secrets.TISTORY_EMAIL }}
          TISTORY_PASSWORD: ${{ secrets.TISTORY_PASSWORD }}
        run: python post_to_tistory.py

      - name: published.json 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add published.json
          git diff --staged --quiet || git commit -m "chore: update published posts [skip ci]"
          git push
